<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer calendar border -->
  <rect x="14" y="22" width="172" height="164" rx="24" ry="24"
        fill="none" stroke="#861F41" stroke-width="9"/>
  <!-- Calendar ring left -->
  <path d="M 62 22 L 62 10 Q 62 6 66 6 L 74 6 Q 78 6 78 10 L 78 22"
        fill="none" stroke="#861F41" stroke-width="9" stroke-linecap="round"/>
  <!-- Calendar ring right -->
  <path d="M 122 22 L 122 10 Q 122 6 126 6 L 134 6 Q 138 6 138 10 L 138 22"
        fill="none" stroke="#861F41" stroke-width="9" stroke-linecap="round"/>

  <!-- 3x3 Grid of rounded squares -->
  <!-- Row 1 (top) -->
  <rect x="23" y="35" width="48" height="44" rx="8" fill="#6b1530"/>
  <rect x="76" y="35" width="48" height="44" rx="8" fill="#521020"/>
  <rect x="129" y="35" width="48" height="44" rx="8" fill="#6b1530"/>
  <!-- Row 2 (middle) -->
  <rect x="23" y="84" width="48" height="44" rx="8" fill="#6b1530"/>
  <rect x="76" y="84" width="48" height="44" rx="8" fill="#16121e"/>
  <rect x="129" y="84" width="48" height="44" rx="8" fill="#16121e"/>
  <!-- Row 3 (bottom) -->
  <rect x="23" y="133" width="48" height="44" rx="8" fill="#7a1836"/>
  <rect x="76" y="133" width="48" height="44" rx="8" fill="#16121e"/>
  <rect x="129" y="133" width="48" height="44" rx="8" fill="#7a1836"/>

  <!-- S-curve: from bottom-left cell center → top-right cell center -->
  <path d="M 47 155 C 47 108 153 102 153 57"
        fill="none" stroke="white" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Bottom-left endpoint circle -->
  <circle cx="47" cy="155" r="9" fill="none" stroke="white" stroke-width="5.5"/>
  <!-- Top-right endpoint circle -->
  <circle cx="153" cy="57" r="9" fill="none" stroke="white" stroke-width="5.5"/>
</svg>
