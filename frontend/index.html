<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HokieCRH — Virginia Tech Course Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #861F4155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #861F41aa; }

    /* Range input */
    input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #e5e0ea; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #861F41; cursor: pointer; }

    /* Smooth transitions */
    button { transition: all 0.15s ease; }

    /* Text rendering */
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Supabase config + client init (order matters) -->
  <script src="src/config.js"></script>
  <script src="src/supabase.js"></script>
  <script src="src/api.js"></script>

  <!-- Mock data (grade colors, pathwaysOptions, prof/section stubs still used by components) -->
  <script src="src/mock-data.js"></script>

  <!-- React components (Babel/JSX) -->
  <script type="text/babel" src="src/components/nav-auth.jsx"></script>
  <script type="text/babel" src="src/components/landing.jsx"></script>
  <script type="text/babel" src="src/components/courses.jsx"></script>
  <script type="text/babel" src="src/components/schedule.jsx"></script>
  <script type="text/babel" src="src/components/dashboard-prof.jsx"></script>
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
