<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darvis</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="/logo-light.svg" type="image/svg+xml" media="(prefers-color-scheme: light)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #861F4155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #861F41aa; }
    input[type=range] {
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #e5e0ea;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #861F41;
      cursor: pointer;
    }
    button { transition: all 0.15s ease; }
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
